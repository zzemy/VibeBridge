name: Bug report
description: Report a reproducible VibeBridge defect
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include session tokens, terminal contents, source code, credentials, or security vulnerability details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe sequence that reproduces the issue.
      placeholder: |
        1. Start VibeBridge with ...
        2. Connect from ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: VibeBridge commit/version, host OS, browser/device, and relevant non-secret configuration.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Safe evidence
      description: Add sanitized logs or screenshots. Remove tokens, paths, prompts, source, and personal data.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets and private terminal or repository content.
          required: true
        - label: This is not a security vulnerability.
          required: true
