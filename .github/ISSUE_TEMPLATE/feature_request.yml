name: Feature request
description: Propose a product or engineering improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should VibeBridge solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable behavior and how it could be verified.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
      description: What workarounds or alternatives have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Local Agent / PTY
        - Web or mobile client
        - Protocol
        - Pairing or security
        - Relay or self-hosting
        - Documentation or release engineering
        - Other
    validations:
      required: true
