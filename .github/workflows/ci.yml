name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod verify
      - run: go vet ./...
      - run: go test ./...
      - if: runner.os == 'Linux'
        run: go test -race ./...
      - run: go build ./cmd/vibebridge

  web:
    name: Web and Protocol
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web proto:lint
      - run: pnpm --dir web proto:generate
      - name: Check generated protocol drift
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain -- gen/go web/src/gen)" ]]; then
            git diff -- gen/go web/src/gen
            git status --short -- gen/go web/src/gen
            exit 1
          fi
      - name: Check protocol compatibility
        shell: bash
        run: |
          if git cat-file -e origin/main:proto/buf.yaml 2>/dev/null; then
            pnpm --dir web proto:breaking
          else
            echo "Skipping breaking check until Protocol V1 exists on main."
          fi
      - run: pnpm --dir web test
      - run: pnpm --dir web build
