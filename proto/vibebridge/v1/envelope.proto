syntax = "proto3";

package vibebridge.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/zzemy/VibeBridge/gen/go/vibebridge/v1;vibebridgev1";

// PeerRole identifies the protocol responsibility of a peer. It does not grant
// authorization; authorization is established outside capability negotiation.
enum PeerRole {
  PEER_ROLE_UNSPECIFIED = 0;
  PEER_ROLE_AGENT = 1;
  PEER_ROLE_CLIENT = 2;
  PEER_ROLE_RELAY = 3;
}

// ProtocolVersion identifies one application-protocol revision.
message ProtocolVersion {
  uint32 major = 1;
  uint32 minor = 2;
}

// ProtocolVersionRange is an inclusive range supported by one peer. Both ends
// must use the same major version; disjoint ranges are incompatible.
message ProtocolVersionRange {
  ProtocolVersion minimum = 1;
  ProtocolVersion maximum = 2;
}

// Hello advertises compatibility before any session mutation is accepted.
// Capability names describe optional behavior and never imply authorization.
message Hello {
  PeerRole peer_role = 1;
  ProtocolVersionRange supported_versions = 2;
  repeated string capabilities = 3;
  uint32 max_envelope_bytes = 4;
}

// TerminalInput carries bytes written to the local PTY.
message TerminalInput {
  bytes data = 1;
}

// TerminalOutput carries bytes read from the local PTY.
message TerminalOutput {
  bytes data = 1;
}

// TerminalResize changes the PTY dimensions. Both values must be in the
// inclusive range 1..65535.
message TerminalResize {
  uint32 columns = 1;
  uint32 rows = 2;
}

// EndSession requests idempotent termination of the active PTY session.
message EndSession {}

// AttachSession starts a fresh attachment or resumes a previously attached
// session. The cursor refers to the highest Agent sequence processed on the
// previous physical connection.
message AttachSession {
  uint64 last_acknowledged_sequence = 1;
}

// ResumeDisposition reports whether the Agent could preserve terminal history.
enum ResumeDisposition {
  RESUME_DISPOSITION_UNSPECIFIED = 0;
  RESUME_DISPOSITION_FRESH = 1;
  RESUME_DISPOSITION_RESUMED = 2;
  RESUME_DISPOSITION_RESYNC_REQUIRED = 3;
}

// SessionStatus binds the connection to the session identity carried by its
// envelope and reports the result of the attachment request.
message SessionStatus {
  ResumeDisposition resume_disposition = 1;
}

// Acknowledgement advances the peer acknowledgement when there is no other
// outbound payload on which it can be piggybacked.
message Acknowledgement {}

// Envelope carries one typed V1 application message. Sequence and acknowledge
// are direction-local counters; zero acknowledge means no message is confirmed.
message Envelope {
  uint32 protocol_major = 1;
  uint32 protocol_minor = 2;
  bytes connection_id = 3;
  bytes session_id = 4;
  uint64 session_generation = 5;
  uint64 sequence = 6;
  uint64 acknowledge = 7;
  google.protobuf.Timestamp sent_at = 8;

  oneof payload {
    Hello hello = 20;
    AttachSession attach_session = 22;
    TerminalInput terminal_input = 23;
    TerminalOutput terminal_output = 24;
    TerminalResize terminal_resize = 25;
    SessionStatus session_status = 26;
    EndSession end_session = 27;
    Acknowledgement acknowledgement = 33;
  }
}
